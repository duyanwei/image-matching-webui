      name: DarkFeat #dispaly name
      source: "AAAI 2023"
      github: https://github.com/THU-LYJ-Lab/DarkFeat
      paper: null
      project: null
      display: true
  sift:
    matcher: NN-mutual
    feature: sift
    dense: false
    info:
      name: SIFT #dispaly name
      source: "IJCV 2004"
      github: null
      paper: https://www.cs.ubc.ca/~lowe/papers/ijcv04.pdf
